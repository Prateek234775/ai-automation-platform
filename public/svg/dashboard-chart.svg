  <line x1="0" y1="64"  x2="280" y2="64"  stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="31"  x2="280" y2="31"  stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Area fill -->
  <path d="M0 130 L35 110 L70 95 L105 78 L140 55 L175 42 L210 30 L245 20 L280 14 L280 130 Z"
