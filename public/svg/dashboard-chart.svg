<svg fill="none" viewBox="0 0 280 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid lines -->
  <line x1="0" y1="130" x2="280" y2="130" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
